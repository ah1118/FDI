<!DOCTYPE html>
<html>
<head>
  <title>Flight Crew Import</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    #lockScreen {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 999999;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .lockBox {
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- LOCK SCREEN -->
  <div id="lockScreen">
    <div class="lockBox">
      <h1>Locked</h1>
      <p>Press Ctrl + Alt + O to unlock</p>
    </div>
  </div>

  <div class="container">
    <h2>Import Crew</h2>

    <label>Flight Number</label>
    <input id="flightNumber" type="text" placeholder="6355">

    <label>Upload Crew PDF</label>
    <input id="pdfFile" type="file" accept="application/pdf">

    <button onclick="processCrew()">Process</button>
  </div>

  <!-- JS FILES -->
  <script src="app.js"></script>
  <script src="flight_rules.js"></script>
  <script src="flightdata.js"></script>

  <!-- ONLY KEY LISTENER (NO VARIABLES HERE) -->
  <script>
    document.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.altKey && key === "o") {
        if (window.unlockSite) {
          window.unlockSite();
        }
      }
    });
  </script>

</body>
</html>
